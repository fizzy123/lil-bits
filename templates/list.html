<script type="text/javascript">
    var csrf_token = "{{ csrf_token() }}";

    $.ajaxSetup({
        beforeSend: function(xhr, settings) {
            if (!/^(GET|HEAD|OPTIONS|TRACE)$/i.test(settings.type) && !this.crossDomain) {
                xhr.setRequestHeader("X-CSRFToken", csrf_token);
            }
        }
    });
</script>
<script>
let goodThings = []
let palette = [
  "#F94144",
  "#F3722C",
  "#F8961E",
  "#F9844A",
  "#F9C74F",
  "#90BE6D",
  "#43AA8B",
  "#4D908E",
  "#577590",
  "#277DA1",
]

// supports both simple arrays and complex weighted arrays
let randomChoice = (array) => {
  if (array.length === 0) {
    return
  }
  if (array[0].weight === undefined || Array.isArray(array[0])) {
    return array[Math.floor(array.length * Math.random())]
  } else {
    // First, we loop the main dataset to count up the total weight. We're starting the counter at one because the upper boundary of Math.random() is exclusive.
    var total = 0;
    for (var i = 0; i < array.length; ++i) {
      total += parseInt(array[i].weight);
    }

    // Total in hand, we can now pick a random value akin to our
    // random index from before.
    const threshold = Math.random() * total;

    // Now we just need to loop through the main data one more time
    // until we discover which value would live within this
    // particular threshold. We need to keep a running count of
    // weights as we go, so let's just reuse the "total" variable
    // since it was already declared.
    total = 0;
    for (var i = 0; i < array.length; ++i) {
      // Add the weight to our running total.
      total += parseInt(array[i].weight);

      // If this value falls within the threshold, we're done!
      if (total >= threshold) {
        return array[i].value;
      }
    }
    return array[i].value;
  }
}

let render = () => {
  $(".good-things").empty()
  for (let thing of goodThings) {
    let li = $("<li>")
    li.text(thing)
    li.css({"color": randomChoice(palette)})
    let delDiv = $("<div>")
    delDiv.addClass("delete")
    delDiv.text("❌")
    delDiv.data("thing", thing)
    li.append(delDiv)
    $(".good-things").prepend(li)
  }

  $("li").on("mouseenter", (e) => {
    $(e.target).find(".delete").css({"display": "inline-block"})
  })

  $("li").on("mouseleave", (e) => {
    $(e.target).find(".delete").css({"display": "none"})
  })

  $(".delete").on("click", (e) => {
    let thing = $(e.target).data("thing") 
    console.log(thing)
    goodThings = goodThings.filter(i => i !== thing);
    submit()
  })
}

let loadData = () => {
  $.ajax({
    url: "/list-data",
    dataType: "json",
    success: (data) => {
      goodThings = data.data.split("|").filter(i => i)
      render()
    },
  });
}

let addGoodThing = () => {
  let goodThing = $("#good-thing-input").val()
  $("#good-thing-input").val("")
  goodThings.push(goodThing)
  submit()
}

let submit = () => {
  $.ajax({
    url: "/list-data",
    dataType: "JSON",
    contentType : "application/json",
    data: JSON.stringify({"data": goodThings.filter(i => i).join("|")}),
    type: "POST",
    success: (data) => {
      render()
    },
  });
}
$(document).ready(function() {
  loadData()
  $(".submit").on("click", addGoodThing)
  $("#good-thing-input").on("keyup", (e) => {
    if(e.which == 13) {
      addGoodThing()
    }
  })
})
</script>
<title>Good Things</title>
  </head>
<body>

  <div class="header">
  <h1>Good Things</h1>
  <div class="subtitle">(not a comprehensive list)</div>
  </div>
  <ul class="good-things">
  </ul>
  <div class="submission">
    <div style="margin-bottom: 16px;"><h2 style="display: inline-block;">Submit a good thing!</h2> <div style="display: inline-block;" class="smol">(be nice!)</div></div>
    <input type="text" name="good-thing" id="good-thing-input" />
    <div class="submit">Submit</div>
  </div>
  </div>
</body>
