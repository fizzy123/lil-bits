// supports both simple arrays and complex weighted arrays
let randomChoice = (array) => {
  if (array.length === 0) {
    return
  }
  if (array[0].weight === undefined || Array.isArray(array[0])) {
    return array[Math.floor(array.length * Math.random())]
  } else {
    // First, we loop the main dataset to count up the total weight. We're starting the counter at one because the upper boundary of Math.random() is exclusive.
    var total = 0;
    for (var i = 0; i < array.length; ++i) {
      total += parseInt(array[i].weight);
    }

    // Total in hand, we can now pick a random value akin to our
    // random index from before.
    const threshold = Math.random() * total;

    // Now we just need to loop through the main data one more time
    // until we discover which value would live within this
    // particular threshold. We need to keep a running count of
    // weights as we go, so let's just reuse the "total" variable
    // since it was already declared.
    total = 0;
    for (var i = 0; i < array.length; ++i) {
      // Add the weight to our running total.
      total += parseInt(array[i].weight);

      // If this value falls within the threshold, we're done!
      if (total >= threshold) {
        return array[i].value;
      }
    }
    return array[i].value;
  }
}

function hslToHex(h, s, l) {
  l /= 100;
  const a = s * Math.min(l, 1 - l) / 100;
  const f = n => {
    const k = (n + h / 30) % 12;
    const color = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
    return Math.round(255 * color).toString(16).padStart(2, '0');   // convert to Hex and prefix "0" if needed
  };
  return `#${f(0)}${f(8)}${f(4)}`;
}

let palette = randomChoice(palettes)
let paletteIndex = 0
$(document).ready(function() {
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");
  ctx.canvas.width  = window.innerWidth;
  ctx.canvas.height = window.innerHeight;
  ctx.lineWidth = 4;
  $("#canvas").on("mouseup", function() {
    mousedown = false
    oldPositions = []
  })
  $("#canvas").on("mousedown", function() {
    mousedown = true
    paletteIndex = (paletteIndex + 1) % palette.length
  })
  $("#canvas").on("mousemove", function(e) {
    if (mousedown) {
//      hue = (hue + 1) % 360
//      ctx.strokeStyle = hslToHex(hue, 100, 50);
      ctx.strokeStyle = palette[paletteIndex];
      let middleX = window.innerWidth / 2
      let middleY = window.innerHeight / 2
      let mouseX = event.pageX
      let mouseY = event.pageY
      let radius = Math.sqrt(Math.pow(middleX - mouseX, 2) + Math.pow(middleY - mouseY, 2))
      let angle = Math.acos((mouseX - middleX)/radius)
      if (mouseY - middleY < 0) {
        angle = -angle
      }
      let newPositions = []
      for (let i=0; i<multiplier; i++) {
        let x = radius * Math.cos(angle + 2 * Math.PI * i / multiplier)
        let y = radius * Math.sin(angle + 2 * Math.PI * i / multiplier)
        newPositions.push({
          x: x,
          y: y,
        })
      }

      if (oldPositions.length !== 0) {
        for (let i=0; i<multiplier; i++) {
          ctx.beginPath();
          ctx.moveTo(oldPositions[i].x + middleX, oldPositions[i].y + middleY)
          ctx.lineTo(newPositions[i].x + middleX, newPositions[i].y + middleY)
          ctx.stroke()
        }
      }
      oldPositions = newPositions;
    }
  })
})
